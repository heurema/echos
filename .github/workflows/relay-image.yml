name: relay image

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag format dev-<7hexsha>-<UTC yyyymmddhhmmss> so Flux's ImagePolicy can
      # numerically sort by the timestamp and pick the newest build.
      - id: tag
        run: echo "tag=dev-$(git rev-parse --short=7 HEAD)-$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/heurema/echos-relay:${{ steps.tag.outputs.tag }}
            ghcr.io/heurema/echos-relay:latest
